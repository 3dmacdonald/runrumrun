const JSONBIN_KEY    = "$2a$10$6B2W.zZyf7So3smFbtRL3uhgJzUEubbXkp.nRwIlX4ke8xDG4EekS";
const JSONBIN_BIN    = "6a28c5f6da38895dfea3f8b5";
const JSONBIN_URL    = `https://api.jsonbin.io/v3/b/${JSONBIN_BIN}`;

// Save to both localStorage (instant) and JSONBin (async, background)
const loadTheme = () => { try { const s = localStorage.getItem(THEME_KEY); return s ? { ...DEFAULT_THEME, ...JSON.parse(s) } : { ...DEFAULT_THEME }; } catch { return { ...DEFAULT_THEME }; } };
const saveTheme = (t) => { try { localStorage.setItem(THEME_KEY, JSON.stringify(t)); } catch {} };
const loadData  = () => { try { const s = localStorage.getItem(STORAGE_KEY); return s ? JSON.parse(s) : SEED; } catch { return SEED; } };
const saveData  = (d) => {
  // Always write to localStorage immediately
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch {}
  // Then push to JSONBin in background
  fetch(JSONBIN_URL, {
    method: "PUT",
    headers: { "Content-Type": "application/json", "X-Master-Key": JSONBIN_KEY, "X-Bin-Versioning": "false" },
    body: JSON.stringify(d)
  }).catch(() => {}); // silently ignore network errors
};

// Pull latest from JSONBin — called once on load
const syncFromCloud = async (setData) => {
  try {
    const res = await fetch(JSONBIN_URL + "/latest", {
      headers: { "X-Master-Key": JSONBIN_KEY, "X-Bin-Meta": "false" }
    });
    if (!res.ok) return;
    const cloud = await res.json();
    if (!cloud.materials || !cloud.ferments || !cloud.charges || !cloud.barrels) return;
    if (!cloud.bottlings) cloud.bottlings = [];
    // Only update if cloud data is different from local
    const local = loadData();
    if (JSON.stringify(cloud) !== JSON.stringify(local)) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(cloud));
      setData(cloud);
    }
  } catch {}
};

// ── Utilities ─────────────────────────────────────────────────────────────────
const fmt2   = (n) => (typeof n === "number" ? n.toFixed(2) : n ?? "—");
const fmtLPA = (n) => (typeof n === "number" ? n.toFixed(3) : "—");
const sum    = (arr, key) => arr.reduce((a, r) => a + (parseFloat(r[key]) || 0), 0);

// ── Shared UI components ──────────────────────────────────────────────────────
function Stat({ label, value, unit, accent, C }) {
  return (
    <div style={{ background:C.panel, border:`1px solid ${C.border}`, borderRadius:6, padding:"14px 18px", minWidth:120 }}>
      <div style={{ fontFamily:"'DM Mono',monospace", fontSize:11, color:C.muted, letterSpacing:"0.12em", textTransform:"uppercase", marginBottom:6 }}>{label}</div>
      <div style={{ fontFamily:"'Playfair Display',serif", fontSize:26, color:accent||C.amber, lineHeight:1 }}>
        {value}<span style={{ fontSize:14, color:C.creamDim, marginLeft:4 }}>{unit}</span>
      </div>
    </div>
  );
}

function Table({ cols, rows, onAdd, addLabel, onEdit, onDelete, C }) {
  const [confirmDel, setConfirmDel] = useState(null);
  return (
    <div style={{ overflowX:"auto" }}>
      <table style={{ width:"100%", borderCollapse:"collapse", fontFamily:"'DM Mono',monospace", fontSize:12 }}>
        <thead>
          <tr>
            {cols.map(c => <th key={c.key} style={{ textAlign:"left", padding:"8px 10px", color:C.muted, borderBottom:`1px solid ${C.border}`, fontWeight:400, letterSpacing:"0.08em", whiteSpace:"nowrap" }}>{c.label}</th>)}
            {(onEdit||onDelete) && <th style={{ borderBottom:`1px solid ${C.border}`, width:64 }}></th>}
          </tr>
        </thead>
        <tbody>
          {rows.map((row, i) => (
            <tr key={row.id||i} style={{ borderBottom:`1px solid ${C.border}` }}>
              {cols.map(c => (
                <td key={c.key} style={{ padding:"8px 10px", color:c.accent?C.amber:C.cream, whiteSpace:"nowrap" }}>
                  {c.fmt ? c.fmt(row[c.key], row) : (row[c.key] ?? "—")}
                </td>
              ))}
              {(onEdit||onDelete) && (
                <td style={{ padding:"8px 6px", whiteSpace:"nowrap" }}>
                  {onEdit && (
                    <button onClick={() => onEdit(row)} title="Edit" style={{ background:"none", border:"none", color:C.muted, cursor:"pointer", fontSize:13, padding:"2px 4px" }}>✎</button>
                  )}
                  {onDelete && (
                    confirmDel === (row.id||i)
                      ? <>
                          <button onClick={() => { onDelete(row); setConfirmDel(null); }} style={{ background:"none", border:"none", color:C.red, cursor:"pointer", fontSize:11, padding:"2px 4px" }}>✓del</button>
                          <button onClick={() => setConfirmDel(null)} style={{ background:"none", border:"none", color:C.muted, cursor:"pointer", fontSize:11, padding:"2px 2px" }}>✕</button>
                        </>
                      : <button onClick={() => setConfirmDel(row.id||i)} title="Delete" style={{ background:"none", border:"none", color:C.muted, cursor:"pointer", fontSize:13, padding:"2px 4px" }}>🗑</button>
                  )}
                </td>
              )}
            </tr>
          ))}
        </tbody>
      </table>
      {onAdd && <button onClick={onAdd} style={{ marginTop:14, background:"transparent", border:`1px solid ${C.amberDim}`, color:C.amber, fontFamily:"'DM Mono',monospace", fontSize:12, padding:"7px 16px", borderRadius:4, cursor:"pointer", letterSpacing:"0.08em" }}>+ {addLabel||"Add Row"}</button>}
    </div>
  );
}

function Modal({ title, onClose, children, C }) {
  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.78)", zIndex:100, display:"flex", alignItems:"center", justifyContent:"center" }}>
      <div style={{ background:C.panel, border:`1px solid ${C.border}`, borderRadius:8, padding:28, width:"min(580px,94vw)", maxHeight:"88vh", overflowY:"auto" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
          <span style={{ fontFamily:"'Playfair Display',serif", fontSize:18, color:C.cream }}>{title}</span>
          <button onClick={onClose} style={{ background:"none", border:"none", color:C.muted, cursor:"pointer", fontSize:20 }}>×</button>
        </div>
        {children}
      </div>
    </div>
  );
}

function Field({ label, name, type="text", value, onChange, step, placeholder, C }) {
  return (
    <div style={{ marginBottom:14 }}>
      <label style={{ display:"block", fontFamily:"'DM Mono',monospace", fontSize:11, color:C.muted, letterSpacing:"0.1em", marginBottom:5, textTransform:"uppercase" }}>{label}</label>
      <input type={type} value={value||""} step={step} placeholder={placeholder}
        onChange={e => onChange(name, type==="number" ? (e.target.value===""?"": parseFloat(e.target.value)) : e.target.value)}
        style={{ width:"100%", background:C.surface, border:`1px solid ${C.border}`, borderRadius:4, color:C.cream, fontFamily:"'DM Mono',monospace", fontSize:13, padding:"8px 10px", boxSizing:"border-box" }} />
    </div>
  );
}

function Sel({ label, name, value, onChange, options, C }) {

    <div style={{ marginBottom:14 }}>
      <label style={{ display:"block", fontFamily:"'DM Mono',monospace", fontSize:11, color:C.muted, letterSpacing:"0.1em", marginBottom:5, textTransform:"uppercase" }}>{label}</label>
      <select value={value||""} onChange={e => onChange(name, e.target.value)}

}

function SaveBtn({ onClick, label, C }) {
  return <button onClick={onClick} style={{ background:C.amber, color:C.bg, border:"none", borderRadius:4, padding:"10px 24px", fontFamily:"'DM Mono',monospace", fontSize:13, cursor:"pointer", marginTop:6 }}>{label||"Save"}</button>;
}

function CalcBtn({ label, onClick, C }) {

// ── useEditModal hook — reusable open/edit/save/delete pattern ────────────────
function useEditModal(emptyForm) {
  const [modal, setModal]   = useState(false);
  const [form, setForm]     = useState(emptyForm);
  const [editId, setEditId] = useState(null);
  const upd = (k, v) => setForm(f => ({ ...f, [k]: v }));
  const openNew  = () => { setForm(emptyForm); setEditId(null); setModal(true); };
  const openEdit = (row) => { setForm({ ...row, charges: Array.isArray(row.charges) ? row.charges.join(", ") : row.charges }); setEditId(row.id); setModal(true); };
  const close    = () => setModal(false);
  return { modal, form, editId, upd, openNew, openEdit, close, setForm };
}

// ── Dashboard ─────────────────────────────────────────────────────────────────
function Dashboard({ data, C }) {
  const totalLPA      = sum(data.charges, "lpa");
  const inBarrel      = data.barrels.filter(b => b.status==="In Barrel").reduce((a,b) => a+(b.currentVol||0), 0);
  const totalBottled  = data.bottlings.reduce((a,b) => a+((b.bottleCount||0)*(b.bottleSizeL||0)), 0);
  const lpaByYear     = {};
  data.charges.forEach(c => { if(!c.date) return; const yr=c.date.split("/")[2]; if(yr) lpaByYear[yr]=(lpaByYear[yr]||0)+(c.lpa||0); });

  return (
    <div>
      <div style={{ marginBottom:28 }}>
        <div style={{ fontFamily:"'Playfair Display',serif", fontSize:13, color:C.muted, letterSpacing:"0.15em", textTransform:"uppercase", marginBottom:4 }}>Run Rum Run · Silent Street Distillery, Moyston</div>
        <div style={{ fontFamily:"'Playfair Display',serif", fontSize:28, color:C.cream }}>Production Overview</div>
      </div>
      <div style={{ display:"flex", flexWrap:"wrap", gap:12, marginBottom:32 }}>
        <Stat C={C} label="Total Molasses In"    value={sum(data.materials,"qty")}        unit="L" />
        <Stat C={C} label="Ferments"             value={data.ferments.length}             unit="batches" />
        <Stat C={C} label="Still Charges"        value={data.charges.length}              unit="runs" />
        <Stat C={C} label="Total LPA Produced"   value={fmtLPA(totalLPA)}                 unit="LAL" accent={C.amber} />
        <Stat C={C} label="Currently in Wood"    value={fmt2(inBarrel)}                   unit="L" />
        <Stat C={C} label="Total Bottled"        value={fmt2(totalBottled)}               unit="L" accent={C.green} />
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16, marginBottom:16 }}>
        <div style={{ background:C.panel, border:`1px solid ${C.border}`, borderRadius:6, padding:20 }}>
          <div style={{ fontFamily:"'DM Mono',monospace", fontSize:11, color:C.muted, letterSpacing:"0.12em", textTransform:"uppercase", marginBottom:14 }}>LAL by Year</div>
          {Object.entries(lpaByYear).sort().map(([yr,lpa]) => (
            <div key={yr} style={{ display:"flex", alignItems:"center", gap:12, marginBottom:8 }}>
              <span style={{ fontFamily:"'DM Mono',monospace", fontSize:12, color:C.creamDim, width:44 }}>{yr}</span>
              <div style={{ flex:1, height:8, background:C.surface, borderRadius:4, overflow:"hidden" }}>
                <div style={{ height:"100%", width:`${Math.min(100,(lpa/totalLPA)*100)}%`, background:C.amber, borderRadius:4 }} />
              </div>
              <span style={{ fontFamily:"'DM Mono',monospace", fontSize:12, color:C.amber, width:60, textAlign:"right" }}>{fmtLPA(lpa)}</span>
            </div>
          ))}
        </div>
        <div style={{ background:C.panel, border:`1px solid ${C.border}`, borderRadius:6, padding:20 }}>
          <div style={{ fontFamily:"'DM Mono',monospace", fontSize:11, color:C.muted, letterSpacing:"0.12em", textTransform:"uppercase", marginBottom:14 }}>Active Barrels</div>
          {data.barrels.filter(b=>b.status==="In Barrel").map(b => {
            const pct=Math.min(100,(b.currentVol/b.sizeL)*100);
            return (
              <div key={b.id} style={{ display:"flex", alignItems:"center", gap:10, marginBottom:8 }}>
                <span style={{ fontFamily:"'DM Mono',monospace", fontSize:12, color:C.creamDim, width:60 }}>Barrel {b.barrelNo}</span>
                <div style={{ flex:1, height:8, background:C.surface, borderRadius:4, overflow:"hidden" }}>
                  <div style={{ height:"100%", width:`${pct}%`, background:pct>90?C.red:C.amberDim, borderRadius:4 }} />
                </div>
                <span style={{ fontFamily:"'DM Mono',monospace", fontSize:11, color:C.creamDim, width:100, textAlign:"right" }}>{fmt2(b.currentVol)}L / {b.sizeL}L</span>
              </div>
            );
          })}
        </div>
      </div>
      {data.bottlings.length > 0 && (
        <div style={{ background:C.panel, border:`1px solid ${C.border}`, borderRadius:6, padding:20 }}>
          <div style={{ fontFamily:"'DM Mono',monospace", fontSize:11, color:C.muted, letterSpacing:"0.12em", textTransform:"uppercase", marginBottom:14 }}>Recent Bottlings</div>
          {data.bottlings.slice(-4).reverse().map(b => (
            <div key={b.id} style={{ display:"flex", gap:16, marginBottom:8, fontFamily:"'DM Mono',monospace", fontSize:12 }}>
              <span style={{ color:C.amber, width:100 }}>{b.batchCode}</span>
              <span style={{ color:C.cream }}>{b.expression}</span>
              <span style={{ color:C.creamDim }}>{b.bottleCount} × {((b.bottleSizeL||0)*1000).toFixed(0)}mL</span>
              <span style={{ color:C.muted }}>{b.date}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── Distillation ──────────────────────────────────────────────────────────────
function Distillation({ data, setData, C }) {
  const EMPTY = { date:"", charge:"", batch:"", type:"Rum", chargeVol:"", washAbv:"", still:"Column 6 Plates", feintsPct:10, actualYield:"", yieldAbv:"", lpa:"", waterAdded:"", dilutedAbv:56, toBarrel:"" };
  const { modal, form, editId, upd, openNew, openEdit, close } = useEditModal(EMPTY);
  const calcLPA = () => { const y=parseFloat(form.actualYield),a=parseFloat(form.yieldAbv); if(y&&a) upd("lpa",(y*(a/100)).toFixed(3)); };
  const calcToBarrel = () => { const lpa=parseFloat(form.lpa),dAbv=parseFloat(form.dilutedAbv)/100,y=parseFloat(form.actualYield)||0; if(lpa&&dAbv){ upd("waterAdded",Math.max(0,(lpa/dAbv)-y).toFixed(2)); upd("toBarrel",(lpa/dAbv).toFixed(2)); } };
  const save = () => {
    const row = { ...form, charge:parseInt(form.charge)||0, batch:parseInt(form.batch)||0, chargeVol:parseFloat(form.chargeVol)||0, washAbv:parseFloat(form.washAbv)||0, feintsPct:parseFloat(form.feintsPct)||0, actualYield:parseFloat(form.actualYield)||0, yieldAbv:parseFloat(form.yieldAbv)||0, lpa:parseFloat(form.lpa)||0, waterAdded:parseFloat(form.waterAdded)||0, dilutedAbv:parseFloat(form.dilutedAbv)||0, toBarrel:parseFloat(form.toBarrel)||0 };
    setData(d => ({ ...d, charges: editId ? d.charges.map(r => r.id===editId?{...row,id:editId}:r) : [...d.charges,{...row,id:Date.now()}] }));
    close();
  };
  const del = (row) => setData(d => ({ ...d, charges: d.charges.filter(r => r.id!==row.id) }));
  const cols = [
    { key:"date",        label:"Date" },
    { key:"charge",      label:"Charge #", accent:true },
    { key:"batch",       label:"Batch #" },
    { key:"type",        label:"Type" },
    { key:"chargeVol",   label:"Charge (L)" },
    { key:"washAbv",     label:"Wash ABV", fmt:v=>`${v}%` },
    { key:"still",       label:"Still" },
    { key:"actualYield", label:"Yield (L)" },
    { key:"yieldAbv",    label:"@ ABV", fmt:v=>`${v}%` },
    { key:"lpa",         label:"LPA (LAL)", accent:true, fmt:v=>fmtLPA(parseFloat(v)) },
    { key:"waterAdded",  label:"Water (L)" },
    { key:"dilutedAbv",  label:"Diluted", fmt:v=>`${v}%` },
    { key:"toBarrel",    label:"→ Barrel (L)" },
  ];
  return (
    <div>
      <SectionHead C={C} title="Distillation" meta={`${data.charges.length} charges · ${fmtLPA(sum(data.charges,"lpa"))} LAL total`} />
      <Table C={C} cols={cols} rows={data.charges} onAdd={openNew} addLabel="Add Charge" onEdit={openEdit} onDelete={del} />
      {modal && <Modal C={C} title={editId?"Edit Charge":"New Still Charge"} onClose={close}>
        <div style={{ display:"flex", gap:10 }}>
          <div style={{ flex:1 }}><Field C={C} label="Date"     name="date"   value={form.date}   onChange={upd} /></div>
          <div style={{ flex:1 }}><Field C={C} label="Charge #" name="charge" value={form.charge} onChange={upd} type="number" /></div>
        </div>
        <div style={{ display:"flex", gap:10 }}>
          <div style={{ flex:1 }}><Field C={C} label="Batch #" name="batch" value={form.batch} onChange={upd} type="number" /></div>
          <div style={{ flex:1 }}><Field C={C} label="Type"    name="type"  value={form.type}  onChange={upd} /></div>
        </div>
        <div style={{ display:"flex", gap:10 }}>
          <div style={{ flex:1 }}><Field C={C} label="Charge Vol (L)" name="chargeVol" value={form.chargeVol} onChange={upd} type="number" step="1" /></div>
          <div style={{ flex:1 }}><Field C={C} label="Wash ABV %"     name="washAbv"   value={form.washAbv}   onChange={upd} type="number" step="0.01" /></div>
        </div>
        <Sel C={C} label="Still" name="still" value={form.still} onChange={upd} options={[{value:"Column 8 Plates",label:"Column 8 Plates"},{value:"Column 6 Plates",label:"Column 6 Plates"}]} />
        <Field C={C} label="Feints %" name="feintsPct" value={form.feintsPct} onChange={upd} type="number" step="0.1" />
        <div style={{ display:"flex", gap:10 }}>
          <div style={{ flex:1 }}><Field C={C} label="Actual Yield (L)" name="actualYield" value={form.actualYield} onChange={upd} type="number" step="0.01" /></div>
          <div style={{ flex:1 }}><Field C={C} label="Yield ABV %"      name="yieldAbv"    value={form.yieldAbv}    onChange={upd} type="number" step="0.1" /></div>
        </div>
        <div style={{ marginBottom:14 }}>
          <CalcBtn C={C} label="Calc LPA"              onClick={calcLPA} />
          <CalcBtn C={C} label="Calc Water + Barrel Vol" onClick={calcToBarrel} />
        </div>
        <div style={{ display:"flex", gap:10 }}>
          <div style={{ flex:1 }}><Field C={C} label="LPA (LAL)"     name="lpa"        value={form.lpa}        onChange={upd} type="number" step="0.001" /></div>
          <div style={{ flex:1 }}><Field C={C} label="Diluted ABV %" name="dilutedAbv" value={form.dilutedAbv} onChange={upd} type="number" step="0.1" /></div>
        </div>
        <div style={{ display:"flex", gap:10 }}>
          <div style={{ flex:1 }}><Field C={C} label="Water Added (L)"  name="waterAdded" value={form.waterAdded} onChange={upd} type="number" step="0.01" /></div>
          <div style={{ flex:1 }}><Field C={C} label="→ Barrel Vol (L)" name="toBarrel"   value={form.toBarrel}   onChange={upd} type="number" step="0.01" /></div>
        </div>
        <SaveBtn C={C} onClick={save} />
      </Modal>}
    </div>
  );
}

// ── Bottling ──────────────────────────────────────────────────────────────────
function Bottling({ data, setData, C }) {
  const EMPTY = { date:"", batchCode:"", expression:"Pure Expression", sourceBarrels:"", volumeDrawn:"", waterAdded:"", finalAbv:"", bottleCount:"", bottleSizeL:0.7, lpaBottled:"", notes:"" };
  const { modal, form, editId, upd, openNew, openEdit, close } = useEditModal(EMPTY);
  const calcLPA      = () => { const v=parseFloat(form.volumeDrawn),a=parseFloat(form.finalAbv); if(v&&a) upd("lpaBottled",(v*(a/100)).toFixed(3)); };
  const calcBottles  = () => { const v=parseFloat(form.volumeDrawn),w=parseFloat(form.waterAdded)||0,s=parseFloat(form.bottleSizeL); if(v&&s) upd("bottleCount",Math.floor((v+w)/s)); };
  const save = () => {
    const row = { ...form, volumeDrawn:parseFloat(form.volumeDrawn)||0, waterAdded:parseFloat(form.waterAdded)||0, finalAbv:parseFloat(form.finalAbv)||0, bottleCount:parseInt(form.bottleCount)||0, bottleSizeL:parseFloat(form.bottleSizeL)||0.7, lpaBottled:parseFloat(form.lpaBottled)||0 };
    setData(d => ({ ...d, bottlings: editId ? d.bottlings.map(r => r.id===editId?{...row,id:editId}:r) : [...d.bottlings,{...row,id:Date.now()}] }));
    close();
  };
  const del = (row) => setData(d => ({ ...d, bottlings: d.bottlings.filter(r => r.id!==row.id) }));
  const totalBottles    = data.bottlings.reduce((a,b)=>a+(b.bottleCount||0),0);
  const totalVolBottled = data.bottlings.reduce((a,b)=>a+((b.bottleCount||0)*(b.bottleSizeL||0)),0);
  const cols = [
    { key:"date",         label:"Date" },
    { key:"batchCode",    label:"Batch Code", accent:true },
    { key:"expression",   label:"Expression" },
    { key:"sourceBarrels",label:"Barrels" },
    { key:"volumeDrawn",  label:"Vol Drawn (L)" },
    { key:"waterAdded",   label:"Water (L)" },
    { key:"finalAbv",     label:"Final ABV", fmt:v=>`${v}%` },
    { key:"bottleCount",  label:"Bottles" },
    { key:"bottleSizeL",  label:"Size", fmt:v=>`${((v||0)*1000).toFixed(0)}mL` },
    { key:"lpaBottled",   label:"LPA (LAL)", accent:true, fmt:v=>fmtLPA(parseFloat(v)) },
    { key:"notes",        label:"Notes" },
  ];
  return (
    <div>
      <SectionHead C={C} title="Bottling" meta={data.bottlings.length ? `${data.bottlings.length} runs · ${totalBottles} bottles · ${fmt2(totalVolBottled)}L · ${fmtLPA(sum(data.bottlings,"lpaBottled"))} LAL` : "No bottling runs recorded yet"} />
      {data.bottlings.length===0
        ? <div style={{ fontFamily:"'DM Mono',monospace", fontSize:12, color:C.muted, padding:"24px 0" }}>Nothing bottled yet.</div>
        : <Table C={C} cols={cols} rows={data.bottlings} onEdit={openEdit} onDelete={del} />
      }
      <button onClick={openNew} style={{ marginTop:14, background:"transparent", border:`1px solid ${C.amberDim}`, color:C.amber, fontFamily:"'DM Mono',monospace", fontSize:12, padding:"7px 16px", borderRadius:4, cursor:"pointer", letterSpacing:"0.08em" }}>+ Add Bottling Run</button>
      {modal && <Modal C={C} title={editId?"Edit Bottling Run":"New Bottling Run"} onClose={close}>
        <div style={{ display:"flex", gap:10 }}>
          <div style={{ flex:1 }}><Field C={C} label="Date"       name="date"      value={form.date}      onChange={upd} /></div>
          <div style={{ flex:1 }}><Field C={C} label="Batch Code" name="batchCode" value={form.batchCode} onChange={upd} placeholder="e.g. RRR-PE-001" /></div>
        </div>
        <Sel C={C} label="Expression" name="expression" value={form.expression} onChange={upd} options={[{value:"Pure Expression",label:"Pure Expression"},{value:"Dark Expression",label:"Dark Expression"},{value:"Coffee Expression",label:"Coffee Expression"}]} />
        <Field C={C} label="Source Barrel(s)"  name="sourceBarrels" value={form.sourceBarrels} onChange={upd} placeholder="e.g. Barrel 3, Barrel 4" />
        <Field C={C} label="Volume Drawn (L)"  name="volumeDrawn"   value={form.volumeDrawn}   onChange={upd} type="number" step="0.01" />
        <div style={{ display:"flex", gap:10 }}>
          <div style={{ flex:1 }}><Field C={C} label="Water Added (L)" name="waterAdded" value={form.waterAdded} onChange={upd} type="number" step="0.01" /></div>
          <div style={{ flex:1 }}><Field C={C} label="Final ABV %"     name="finalAbv"   value={form.finalAbv}   onChange={upd} type="number" step="0.1" /></div>
        </div>
        <div style={{ display:"flex", gap:10 }}>
          <div style={{ flex:1 }}><Field C={C} label="Bottle Size (L)" name="bottleSizeL" value={form.bottleSizeL} onChange={upd} type="number" step="0.05" placeholder="0.7 = 700mL" /></div>
          <div style={{ flex:1 }}><Field C={C} label="Bottle Count"    name="bottleCount" value={form.bottleCount} onChange={upd} type="number" step="1" /></div>
        </div>
        <div style={{ marginBottom:14 }}>
          <CalcBtn C={C} label="Calc LPA"        onClick={calcLPA} />
          <CalcBtn C={C} label="Estimate Bottles" onClick={calcBottles} />
        </div>
        <Field C={C} label="LPA Bottled (LAL)" name="lpaBottled" value={form.lpaBottled} onChange={upd} type="number" step="0.001" />
        <Field C={C} label="Notes" name="notes" value={form.notes} onChange={upd} placeholder="e.g. 18 months ex-bourbon, blend of barrels 3+4" />
        <SaveBtn C={C} onClick={save} />
      </Modal>}
    </div>
  );
}

// ── Excise ────────────────────────────────────────────────────────────────────
function Excise({ data, C }) {
  const byFY = {};
  const addFY = (dateStr, lpaProduced=0, lpaBottled=0, charge=null) => {
    if (!dateStr) return;
    const p=dateStr.split("/"); if(p.length<3) return;
    const mo=parseInt(p[1]),yr=parseInt(p[2]);
    const fy=mo>=7?`FY${yr}/${String(yr+1).slice(2)}`:`FY${yr-1}/${String(yr).slice(2)}`;
    if(!byFY[fy]) byFY[fy]={charges:[],lpaProduced:0,lpaBottled:0};
    byFY[fy].lpaProduced+=lpaProduced; byFY[fy].lpaBottled+=lpaBottled;
    if(charge!==null) byFY[fy].charges.push(charge);
  };
  data.charges.forEach(c => addFY(c.date, c.lpa||0, 0, c.charge));
  data.bottlings.forEach(b => addFY(b.date, 0, b.lpaBottled||0));
  const totalLPA=sum(data.charges,"lpa"), totalBottledLPA=sum(data.bottlings,"lpaBottled"), RATE=101.05;
  return (
    <div>
      <SectionHead C={C} title="Excise Summary" meta="ATO-ready production log · verify current excise rate at ato.gov.au" />
      <div style={{ display:"flex", flexWrap:"wrap", gap:12, marginBottom:28 }}>
        <Stat C={C} label="Total LAL Produced"       value={fmtLPA(totalLPA)}                      unit="LAL" />
        <Stat C={C} label="Total LAL Bottled"        value={fmtLPA(totalBottledLPA)}               unit="LAL" accent={C.green} />
        <Stat C={C} label="LAL In Wood / Stock"      value={fmtLPA(totalLPA-totalBottledLPA)}      unit="LAL" accent={C.amberDim} />
        <Stat C={C} label="Indicative Excise (total)" value={`$${(totalLPA*RATE).toLocaleString("en-AU",{maximumFractionDigits:0})}`} unit="" accent={C.red} />
      </div>
      <div style={{ background:C.panel, border:`1px solid ${C.border}`, borderRadius:6, padding:20, marginBottom:24 }}>
        <div style={{ fontFamily:"'DM Mono',monospace", fontSize:11, color:C.muted, letterSpacing:"0.12em", textTransform:"uppercase", marginBottom:14 }}>By Financial Year</div>
        <table style={{ width:"100%", borderCollapse:"collapse", fontFamily:"'DM Mono',monospace", fontSize:12 }}>
          <thead><tr>{["Financial Year","Charges","LAL Produced","LAL Bottled","Indicative Excise"].map(h=><th key={h} style={{ textAlign:"left", padding:"6px 10px", color:C.muted, borderBottom:`1px solid ${C.border}`, fontWeight:400 }}>{h}</th>)}</tr></thead>
          <tbody>{Object.entries(byFY).sort().map(([fy,row])=>(
            <tr key={fy} style={{ borderBottom:`1px solid ${C.border}` }}>
              <td style={{ padding:"8px 10px", color:C.amber }}>{fy}</td>
              <td style={{ padding:"8px 10px", color:C.cream }}>{row.charges.join(", ")||"—"}</td>
              <td style={{ padding:"8px 10px", color:C.cream }}>{fmtLPA(row.lpaProduced)} LAL</td>
              <td style={{ padding:"8px 10px", color:C.green }}>{fmtLPA(row.lpaBottled||0)} LAL</td>
              <td style={{ padding:"8px 10px", color:C.red }}>${(row.lpaProduced*RATE).toLocaleString("en-AU",{maximumFractionDigits:2})}</td>
            </tr>
          ))}</tbody>
        </table>
      </div>
      <div style={{ background:C.panel, border:`1px solid ${C.border}`, borderRadius:6, padding:20 }}>
        <div style={{ fontFamily:"'DM Mono',monospace", fontSize:11, color:C.muted, letterSpacing:"0.12em", textTransform:"uppercase", marginBottom:14 }}>Per-Charge Record</div>
        <Table C={C} cols={[{key:"charge",label:"Charge #"},{key:"date",label:"Date"},{key:"batch",label:"Batch"},{key:"type",label:"Type"},{key:"chargeVol",label:"Charge (L)"},{key:"actualYield",label:"Yield (L)"},{key:"yieldAbv",label:"ABV %",fmt:v=>`${v}%`},{key:"lpa",label:"LAL",accent:true,fmt:v=>fmtLPA(parseFloat(v))}]} rows={data.charges} />
      </div>
      <div style={{ marginTop:20, padding:14, background:C.surface, border:`1px solid ${C.border}`, borderRadius:6, fontFamily:"'DM Mono',monospace", fontSize:11, color:C.muted, lineHeight:1.7 }}>
        ⚠ Excise liability is indicative only at $101.05/LAL. Verify current rate at ato.gov.au. Small distillers may be eligible for the Craft Beverage Maker Tax Offset. Consult your excise advisor.
      </div>
    </div>
  );
}

// ── Audit Report ──────────────────────────────────────────────────────────────

    const fy=mo>=7?`FY${yr}/${yr+1}`:`FY${yr-1}/${yr}`;

// ── Data Export / Import / Backup UI (injected into App shell) ───────────────
// Patch the App export to include data management
function DataManager({ data, setData, C }) {
  const [showImport, setShowImport] = useState(false);
  const [importText, setImportText] = useState("");
  const [importErr,  setImportErr]  = useState("");
  const fileRef = useRef();

  const exportJSON = () => {
    const payload = { exportedAt: new Date().toISOString(), version: "rrr_v2", data };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href     = url;
    a.download = `RunRumRun-backup-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  const importFromText = (text) => {
    try {
      const parsed = JSON.parse(text);
      const d = parsed.data || parsed;
      if (!d.materials || !d.ferments || !d.charges || !d.barrels) throw new Error("Missing required sections");
      if (!d.bottlings) d.bottlings = [];
      setData(d);
      setShowImport(false);
      setImportText("");
      setImportErr("");
      alert("Data imported successfully.");
    } catch(e) {
      setImportErr("Invalid backup file: " + e.message);
    }
  };

  const handleFile = (e) => {
    const f = e.target.files[0];
    if (!f) return;
    const reader = new FileReader();
    reader.onload = (ev) => importFromText(ev.target.result);
    reader.readAsText(f);
  };

  const C2 = C;
  return (
    <>
      <div style={{ display:"flex", gap:8 }}>
        <button onClick={exportJSON} style={{ background:"transparent", border:`1px solid ${C2.amberDim}`, color:C2.amber, fontFamily:"'DM Mono',monospace", fontSize:11, padding:"6px 12px", borderRadius:4, cursor:"pointer", letterSpacing:"0.06em" }}>⬇ Export Backup</button>
        <button onClick={() => setShowImport(true)} style={{ background:"transparent", border:`1px solid ${C2.border}`, color:C2.muted, fontFamily:"'DM Mono',monospace", fontSize:11, padding:"6px 12px", borderRadius:4, cursor:"pointer", letterSpacing:"0.06em" }}>⬆ Import Backup</button>
      </div>

      {showImport && (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.78)", zIndex:200, display:"flex", alignItems:"center", justifyContent:"center" }}>
          <div style={{ background:C2.panel, border:`1px solid ${C2.border}`, borderRadius:8, padding:28, width:"min(500px,94vw)" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
              <span style={{ fontFamily:"'Playfair Display',serif", fontSize:18, color:C2.cream }}>Import Backup</span>
              <button onClick={() => { setShowImport(false); setImportErr(""); }} style={{ background:"none", border:"none", color:C2.muted, cursor:"pointer", fontSize:20 }}>×</button>
            </div>
            <div style={{ fontFamily:"'DM Mono',monospace", fontSize:11, color:C2.muted, marginBottom:16, lineHeight:1.6 }}>
              Select a <code style={{ color:C2.creamDim }}>.json</code> backup file exported from this app. This will <strong style={{ color:C2.red }}>replace all current data</strong>.
            </div>
            <input ref={fileRef} type="file" accept=".json" onChange={handleFile} style={{ display:"none" }} />
            <button onClick={() => fileRef.current.click()} style={{ background:C2.amber, color:C2.bg, border:"none", borderRadius:4, padding:"10px 20px", fontFamily:"'DM Mono',monospace", fontSize:13, cursor:"pointer", marginBottom:16 }}>Choose File…</button>
            {importErr && <div style={{ fontFamily:"'DM Mono',monospace", fontSize:11, color:C2.red, marginTop:8 }}>{importErr}</div>}
          </div>
        </div>
      )}
    </>
  );
}

// ── Override ReactDOM render to inject DataManager into header ────────────────
const _OrigApp = App;
function AppWithDataManager() {
  const [tab,        setTab]        = useState("Dashboard");
  const [theme,      setTheme]      = useState(() => loadTheme());
  const [showTheme,  setShowTheme]  = useState(false);
  const [data,       setDataRaw]    = useState(() => loadData());
  const [syncStatus, setSyncStatus] = useState("idle"); // idle | syncing | ok | error
  const C = theme;

  const setData = (updater) => {
    setDataRaw(prev => { const next = typeof updater==="function"?updater(prev):updater; saveData(next); return next; });
  };

  // Pull from cloud on first load
  React.useEffect(() => {
    setSyncStatus("syncing");
    syncFromCloud(setDataRaw)
      .then(() => setSyncStatus("ok"))
      .catch(() => setSyncStatus("error"));
  }, []);

  return (
    <div style={{ minHeight:"100vh", background:C.bg, color:C.cream, fontFamily:"'DM Mono',monospace" }}>
      {/* Header */}
      <div style={{ borderBottom:`1px solid ${C.border}`, padding:"16px 28px", display:"flex", alignItems:"center", gap:12, flexWrap:"wrap" }}>
        <div>
          <div style={{ fontFamily:"'Playfair Display',serif", fontSize:20, color:C.amber, letterSpacing:"0.04em" }}>Run Rum Run</div>
          <div style={{ fontFamily:"'DM Mono',monospace", fontSize:10, color:C.muted, letterSpacing:"0.15em", textTransform:"uppercase" }}>Production Log · Silent Street Distillery</div>
        </div>
        <div style={{ flex:1 }} />
        <DataManager data={data} setData={setData} C={C} />
        <div style={{ fontFamily:"'DM Mono',monospace", fontSize:10, color: syncStatus==="syncing"?C.amber: syncStatus==="error"?C.red: C.green, title:"Cloud sync status" }}>
          {syncStatus==="syncing"?"↻ syncing…": syncStatus==="error"?"⚠ offline": "✓ synced"}
        </div>
        <div style={{ fontFamily:"'DM Mono',monospace", fontSize:10, color:C.muted }}>{new Date().toLocaleDateString("en-AU")}</div>
        <button onClick={() => setShowTheme(true)} title="Colour theme" style={{ background:"transparent", border:`1px solid ${C.border}`, color:C.muted, fontFamily:"'DM Mono',monospace", fontSize:11, padding:"6px 12px", borderRadius:4, cursor:"pointer", letterSpacing:"0.06em" }}>🎨 Theme</button>
      </div>

      {/* Nav */}
      <div style={{ borderBottom:`1px solid ${C.border}`, display:"flex", overflowX:"auto", padding:"0 28px" }}>
        {NAV_TABS.map(t => (
          <button key={t} onClick={() => setTab(t)} style={{ background:"none", border:"none", borderBottom:t===tab?`2px solid ${C.amber}`:"2px solid transparent", color:t===tab?C.amber:C.muted, fontFamily:"'DM Mono',monospace", fontSize:12, padding:"14px 16px", cursor:"pointer", letterSpacing:"0.06em", whiteSpace:"nowrap" }}>{t}</button>
        ))}
      </div>

      {/* Content */}
      <div style={{ padding:28, maxWidth:1200 }}>
        {tab==="Dashboard"     && <Dashboard    data={data} C={C} />}
        {tab==="Raw Materials"  && <RawMaterials data={data} setData={setData} C={C} />}
        {tab==="Fermentation"  && <Fermentation data={data} setData={setData} C={C} />}
        {tab==="Distillation"  && <Distillation data={data} setData={setData} C={C} />}
        {tab==="Barrel Aging"  && <BarrelAging  data={data} setData={setData} C={C} />}
        {tab==="Bottling"      && <Bottling     data={data} setData={setData} C={C} />}
        {tab==="Excise"        && <Excise       data={data} C={C} />}
        {tab==="Audit Report"  && <AuditReport  data={data} />}
      </div>

      {showTheme && <ThemeEditor theme={theme} setTheme={setTheme} onClose={() => setShowTheme(false)} C={C} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<AppWithDataManager />);
</script>
</body>
</html>
